      - "5005:80"
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:80
      ConnectionStrings__DefaultConnection: Host=postgres;Database=supplierdb;Username=postgres;Password=postgres123
    depends_on:
      - postgres
    networks:
      - stockpro-network

  movement-service:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: movement-service
    restart: always
    working_dir: /app
    volumes:
      - ./MovementService:/app
    command: dotnet run
    ports:
      - "5006:80"
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:80
      ConnectionStrings__DefaultConnection: Host=postgres;Database=movementdb;Username=postgres;Password=postgres123
    depends_on:
      - postgres
    networks:
